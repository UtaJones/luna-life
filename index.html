<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#765da8"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="LUNA"><link rel="manifest" href="manifest.json?v=17"><link rel="apple-touch-icon" sizes="192x192" href="icon-192.png?v=17"><link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=17"><link rel="shortcut icon" href="icon-192.png?v=17"><link rel="icon" href="icon.svg?v=17" type="image/svg+xml"><title>LUNA</title><link rel="stylesheet" href="style.css"></head>
<body><main class="app">
<section id="homeView" class="home-view">
  <p class="eyebrow">LUNA</p><h1>我的生活轨迹</h1><p class="home-subtitle">让每一个日子存在可见的节奏</p>
  <section class="today-dashboard"><div class="dashboard-heading"><div><span class="eyebrow">TODAY</span><h2>今日状态</h2></div><span id="todayLabel" class="muted"></span></div><div class="dashboard-grid"><article class="dashboard-card resource"><small>资源</small><b id="dashBalance">¥0.00</b><span id="dashFinanceNote">本月结余</span></article><article class="dashboard-card body"><small>身体</small><b id="dashWeight">—</b><span id="dashBodyNote">最近体重</span></article><article class="dashboard-card growth"><small>成长</small><b id="dashProgress">0%</b><span id="dashGrowthNote">任务完成率</span></article></div></section>
  <section class="review-card"><div><span class="eyebrow">WEEKLY NOTE</span><h2>本周回顾</h2></div><div class="review-grid"><span><b id="reviewSpend">¥0.00</b><small>消费</small></span><span><b id="reviewMove">0 min</b><small>运动</small></span><span><b id="reviewStudy">0%</b><small>学习完成</small></span></div></section>
  <div class="home-section-label">进入模块</div><div class="home-grid"><button class="home-card finance" data-home="finance"><span class="home-icon">◒</span><b>资源</b><small>理清你的数字与选择</small></button><button class="home-card health" data-home="health"><span class="home-icon">⌁</span><b>身体</b><small>观察身体状态的变化</small></button><button class="home-card learning" data-home="learning"><span class="home-icon">✦</span><b>成长</b><small>把每个想法落到行动</small></button></div>
</section>
<section id="detailView" class="detail-view hidden"><header><div><button id="backHome" class="back-button">← 首页</button><p class="eyebrow">LUNA</p><h1 id="detailHeading">资源</h1></div><div class="header-actions"><button id="manageCategories" class="ghost">我的分类</button><button id="dataTools" class="ghost">导出备份</button></div></header><div class="module-switch"><button class="module active finance" data-module="finance">资源</button><button class="module health" data-module="health">身体</button><button class="module learning" data-module="learning">成长</button></div><section id="personalModules" class="personal-modules hidden"><div id="moduleTitle"></div><div id="moduleItems" class="module-items"></div></section><section class="summary"><div><span>本月收入</span><strong id="income">¥0.00</strong></div><div><span>本月支出</span><strong id="expense">¥0.00</strong></div><div><span>结余</span><strong id="balance">¥0.00</strong></div></section><nav><button class="tab active" data-view="records">明细</button><button class="tab" data-view="stats">统计</button></nav><section id="recordsView" class="view"><div class="section-title"><h2>本月记账</h2><button id="addTop" class="primary small">＋记一笔</button></div><div id="calendar" class="calendar"></div><div id="records" class="records"></div></section><section id="statsView" class="view hidden"><div class="section-title"><h2>本月统计</h2></div><div id="stats" class="stats"></div></section></section>
</main><dialog id="recordDialog"><form method="dialog" id="recordForm"><h2>新增记录</h2><div class="switch"><label><input type="radio" name="type" value="expense" checked>支出</label><label><input type="radio" name="type" value="income">收入</label></div><label>金额<input name="amount" type="number" min="0" step="0.01" inputmode="decimal" required></label><label>分类<select id="category" name="category" required></select></label><label>日期<input name="date" type="date" required></label><label>备注<input name="note" maxlength="80"></label><div class="actions"><button type="button" id="cancel" class="ghost">取消</button><button class="primary">保存</button></div></form></dialog><dialog id="categoryDialog"><form method="dialog"><h2>我的分类</h2><div id="categoryList"></div><div class="actions"><button class="primary">完成</button></div></form></dialog><script src="app.js"></script><script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'))}</script></body></html>
